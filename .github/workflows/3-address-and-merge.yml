name: 🔧 3 — Address & Merge (CodeRabbit)

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  address-and-merge:
    runs-on: ubuntu-latest
    # Only handle: CodeRabbit reviews on autopilot PRs
    if: |
      contains(github.event.pull_request.head.ref, 'ai-gen/') &&
      (github.event.review.user.login == 'coderabbitai[bot]' ||
       github.event.review.user.login == 'coderabbitai')
    steps:
      - name: Checkout ai-autopilot (engine)
        uses: actions/checkout@v4
        with:
          repository: vishwak1002/ai-autopilot
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get CodeRabbit review state
        id: review
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          STATE="${{ github.event.review.state }}"
          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "CodeRabbit review state: $STATE"

      - name: Merge if CodeRabbit approved
        if: github.event.review.state == 'approved'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TARGET_REPO: ${{ github.repository }}
          REVIEW_STATE: APPROVED
        run: |
          echo "✅ CodeRabbit approved — merging"
          python scripts/merge.py

      - name: Write FEEDBACK.md and close PR if changes requested
        if: github.event.review.state == 'changes_requested'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TARGET_REPO: ${{ github.repository }}
          REVIEW_STATE: CHANGES_REQUESTED
        run: |
          echo "⚠️ CodeRabbit requested changes — writing to FEEDBACK.md"

          REPO_DIR="/tmp/target-feedback"
          gh repo clone "$TARGET_REPO" "$REPO_DIR" -- --depth=1

          TARGET_REPO_PATH="$REPO_DIR" python scripts/address.py

          # Commit and push updated FEEDBACK.md back to target repo
          cd "$REPO_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FEEDBACK.md
          git diff --staged --quiet || git commit -m "🔄 Autopilot: Add refined prompt to FEEDBACK.md (PR #${{ github.event.pull_request.number }}, CodeRabbit changes requested)"
          git push origin main || echo "Nothing to push"

      - name: Summary
        run: |
          STATE="${{ github.event.review.state }}"
          echo "### 🔧 CodeRabbit Review Result" >> $GITHUB_STEP_SUMMARY
          echo "- **State:** $STATE" >> $GITHUB_STEP_SUMMARY
          if [ "$STATE" = "approved" ]; then
            echo "- **Action:** ✅ Merged to main" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATE" = "changes_requested" ]; then
            echo "- **Action:** 🔄 Refined prompt written to FEEDBACK.md, PR closed" >> $GITHUB_STEP_SUMMARY
            echo "- **Next:** Autopilot routine will retry in the next cycle" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Action:** ⏭️ Comment only — no action taken" >> $GITHUB_STEP_SUMMARY
          fi
